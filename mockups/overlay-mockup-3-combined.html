<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overlay Mockup 3 - Combined Digital + Ring</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@900&family=Inter:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #2a2a2a;
            background-image: url('https://picsum.photos/1920/1080');
            background-size: cover;
            background-position: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.8) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.5s ease;
        }

        .main-display {
            position: relative;
            width: 800px;
            height: 800px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .ring-background {
            fill: none;
            stroke: rgba(255,255,255,0.05);
            stroke-width: 60;
        }

        .ring-progress {
            fill: none;
            stroke: url(#gradient);
            stroke-width: 60;
            stroke-linecap: round;
            stroke-dasharray: 2324;
            stroke-dashoffset: 0;
            transition: stroke-dashoffset 1s linear;
            filter: drop-shadow(0 0 40px rgba(74, 222, 128, 0.6));
        }

        .ring-progress.warning {
            stroke: url(#gradient-warning);
            filter: drop-shadow(0 0 40px rgba(251, 191, 36, 0.6));
        }

        .ring-progress.critical {
            stroke: url(#gradient-critical);
            filter: drop-shadow(0 0 60px rgba(239, 68, 68, 1));
            animation: criticalPulse 0.5s ease-in-out infinite;
        }

        .timer-group {
            position: absolute;
            text-align: center;
            z-index: 10;
        }

        .timer-display {
            font-family: 'Orbitron', monospace;
            font-size: 180px;
            font-weight: 900;
            color: white;
            text-shadow:
                0 0 40px currentColor,
                0 4px 8px rgba(0,0,0,0.8);
            line-height: 1;
            letter-spacing: 10px;
            animation: numberPulse 1s ease-in-out infinite;
        }

        .timer-display.warning {
            color: #fbbf24;
        }

        .timer-display.critical {
            color: #ef4444;
            animation: criticalNumberPulse 0.5s ease-in-out infinite;
        }

        .speaker-badge {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, rgba(96,165,250,0.2) 0%, rgba(147,51,234,0.2) 100%);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 30px;
            padding: 20px 60px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .speaker-label {
            font-size: 20px;
            color: rgba(255,255,255,0.6);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 8px;
        }

        .speaker-name {
            font-size: 48px;
            color: white;
            font-weight: 700;
        }

        .queue-visual {
            position: absolute;
            bottom: 150px;
            display: flex;
            align-items: center;
            gap: 30px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            padding: 30px 50px;
            border-radius: 25px;
        }

        .queue-count {
            font-size: 72px;
            font-weight: bold;
            color: #60a5fa;
            text-shadow: 0 0 20px rgba(96,165,250,0.5);
        }

        .queue-label {
            font-size: 28px;
            color: rgba(255,255,255,0.8);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .control-panel {
            position: absolute;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .control-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 3px solid rgba(255,255,255,0.3);
            color: white;
            font-size: 32px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.1);
        }

        .control-btn.active {
            background: rgba(74,222,128,0.3);
            border-color: #4ade80;
            animation: pulse 2s ease-in-out infinite;
        }

        .grace-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 100px;
            color: #60a5fa;
            font-weight: bold;
            opacity: 0;
            pointer-events: none;
            animation: graceAnimation 1s ease;
        }

        .grace-indicator.show {
            animation: graceAnimation 1s ease forwards;
        }

        @keyframes graceAnimation {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.5);
            }
            50% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.5);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) translateY(-100px) scale(1);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes numberPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        @keyframes criticalNumberPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        @keyframes criticalPulse {
            0%, 100% {
                filter: drop-shadow(0 0 60px rgba(239, 68, 68, 1));
            }
            50% {
                filter: drop-shadow(0 0 100px rgba(239, 68, 68, 1));
            }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .paused-state {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .paused .paused-state {
            display: flex;
        }

        .pause-text {
            font-size: 150px;
            color: #fbbf24;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 20px;
            animation: pauseBlink 1s ease-in-out infinite;
        }

        @keyframes pauseBlink {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.95); }
        }

        .shortcut-guide {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 30px;
            background: rgba(0,0,0,0.6);
            padding: 15px 30px;
            border-radius: 15px;
            font-size: 16px;
            color: rgba(255,255,255,0.8);
        }

        .key {
            background: rgba(255,255,255,0.2);
            padding: 4px 12px;
            border-radius: 6px;
            font-weight: bold;
            margin: 0 5px;
        }
    </style>
</head>
<body>
    <div class="overlay">
        <div class="speaker-badge">
            <div class="speaker-label">Speaking Now</div>
            <div class="speaker-name">Michael Chen</div>
        </div>

        <div class="main-display">
            <svg>
                <defs>
                    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
                        <stop offset="50%" style="stop-color:#4ade80;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
                    </linearGradient>
                    <linearGradient id="gradient-warning" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
                    </linearGradient>
                    <linearGradient id="gradient-critical" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
                    </linearGradient>
                </defs>
                <circle cx="400" cy="400" r="370" class="ring-background"></circle>
                <circle cx="400" cy="400" r="370" class="ring-progress" id="progress"></circle>
            </svg>
            <div class="timer-group">
                <div class="timer-display" id="timer">04:15</div>
            </div>
        </div>

        <div class="queue-visual">
            <div class="queue-count">7</div>
            <div class="queue-label">In Queue</div>
        </div>

        <div class="control-panel">
            <button class="control-btn" title="Pause/Resume (P)">⏸</button>
            <button class="control-btn" title="Add 15 seconds (G)">+15</button>
            <button class="control-btn" title="End Turn (Space)">✓</button>
            <button class="control-btn active" title="Next Speaker (N)">→</button>
        </div>

        <div class="grace-indicator" id="grace">+15s</div>

        <div class="paused-state">
            <div class="pause-text">PAUSED</div>
        </div>

        <div class="shortcut-guide">
            <span><span class="key">Space</span> End Turn</span>
            <span><span class="key">N</span> Next Speaker</span>
            <span><span class="key">P</span> Pause/Resume</span>
            <span><span class="key">G</span> Grace +15s</span>
        </div>
    </div>

    <script>
        let seconds = 255; // 4:15
        let totalSeconds = 300; // 5 minutes total
        let paused = false;
        const circumference = 2 * Math.PI * 370;

        function updateTimer() {
            if (!paused) {
                seconds--;
                if (seconds < 0) seconds = 255;
            }

            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            const display = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
            const timer = document.getElementById('timer');
            timer.textContent = display;

            // Update progress ring
            const progress = document.getElementById('progress');
            const offset = circumference - (seconds / totalSeconds) * circumference;
            progress.style.strokeDashoffset = offset;

            // Change colors based on time
            timer.className = 'timer-display';
            progress.className = 'ring-progress';
            if (seconds <= 30) {
                timer.className = 'timer-display critical';
                progress.className = 'ring-progress critical';
            } else if (seconds <= 120) {
                timer.className = 'timer-display warning';
                progress.className = 'ring-progress warning';
            }
        }

        setInterval(updateTimer, 1000);

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'p' || e.key === 'P') {
                paused = !paused;
                document.querySelector('.overlay').classList.toggle('paused');
            } else if (e.key === 'g' || e.key === 'G') {
                seconds = Math.min(seconds + 15, totalSeconds);
                const grace = document.getElementById('grace');
                grace.classList.add('show');
                setTimeout(() => grace.classList.remove('show'), 1000);
            }
        });
    </script>
</body>
</html>
