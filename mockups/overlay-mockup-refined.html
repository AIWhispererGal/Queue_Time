<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overlay Mockup - Refined Design</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@900&family=Inter:wght@400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #2a2a2a;
            background-image: url('https://picsum.photos/1920/1080');
            background-size: cover;
            background-position: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.7) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.5s ease;
        }

        /* Main timer and ring container */
        .main-display {
            position: relative;
            width: 800px;
            height: 800px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Progress Ring SVG */
        svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
            z-index: 1;
        }

        .ring-background {
            fill: none;
            stroke: rgba(255,255,255,0.08);
            stroke-width: 50;
        }

        .ring-progress {
            fill: none;
            stroke: url(#gradient);
            stroke-width: 50;
            stroke-linecap: round;
            stroke-dasharray: 2324;
            stroke-dashoffset: 0;
            transition: stroke-dashoffset 1s linear;
            filter: drop-shadow(0 0 30px rgba(74, 222, 128, 0.5));
        }

        .ring-progress.warning {
            stroke: url(#gradient-warning);
            filter: drop-shadow(0 0 30px rgba(251, 191, 36, 0.5));
        }

        .ring-progress.critical {
            stroke: url(#gradient-critical);
            filter: drop-shadow(0 0 50px rgba(239, 68, 68, 0.8));
            animation: criticalPulse 0.5s ease-in-out infinite;
        }

        /* Timer and speaker info - in FRONT of ring */
        .timer-group {
            position: absolute;
            text-align: center;
            z-index: 10;
        }

        .speaker-name {
            font-size: 56px;
            color: white;
            font-weight: 700;
            margin-bottom: 20px;
            text-shadow: 0 4px 16px rgba(0,0,0,0.8);
            background: linear-gradient(135deg, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.5) 100%);
            padding: 15px 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .timer-display {
            font-family: 'Orbitron', monospace;
            font-size: 200px;
            font-weight: 900;
            color: white;
            text-shadow:
                0 0 40px currentColor,
                0 8px 16px rgba(0,0,0,0.8);
            line-height: 1;
            letter-spacing: 10px;
            animation: numberPulse 1s ease-in-out infinite;
        }

        .timer-display.warning {
            color: #fbbf24;
        }

        .timer-display.critical {
            color: #ef4444;
            animation: criticalNumberPulse 0.5s ease-in-out infinite;
        }

        /* Next speaker info at bottom */
        .next-speaker {
            position: absolute;
            bottom: 100px;
            background: linear-gradient(135deg, rgba(96,165,250,0.15) 0%, rgba(147,51,234,0.15) 100%);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 25px;
            padding: 25px 50px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .next-label {
            font-size: 24px;
            color: rgba(255,255,255,0.6);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 8px;
        }

        .next-name {
            font-size: 42px;
            color: #60a5fa;
            font-weight: 700;
            text-shadow: 0 0 20px rgba(96,165,250,0.4);
        }

        /* Queue list on the right side */
        .queue-list {
            position: absolute;
            right: 60px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-height: 80vh;
            overflow: hidden;
        }

        .queue-item {
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 15px 25px;
            color: white;
            font-size: 20px;
            font-weight: 600;
            position: relative;
            transition: all 0.5s ease;
            opacity: 0.6;
            transform: translateX(0);
        }

        .queue-item.current {
            background: linear-gradient(135deg, rgba(74,222,128,0.2) 0%, rgba(16,185,129,0.2) 100%);
            border-color: rgba(74,222,128,0.5);
            opacity: 1;
            font-size: 24px;
            padding: 20px 30px;
            box-shadow: 0 0 30px rgba(74,222,128,0.3);
        }

        .queue-item.next {
            background: linear-gradient(135deg, rgba(96,165,250,0.15) 0%, rgba(59,130,246,0.15) 100%);
            border-color: rgba(96,165,250,0.4);
            opacity: 0.9;
        }

        .queue-position {
            display: inline-block;
            width: 30px;
            height: 30px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            text-align: center;
            line-height: 30px;
            margin-right: 15px;
            font-size: 16px;
            color: rgba(255,255,255,0.8);
        }

        .queue-item.current .queue-position {
            background: #4ade80;
            color: #000;
            font-weight: bold;
        }

        /* Animations for queue transitions */
        @keyframes slideOut {
            0% {
                opacity: 1;
                transform: translateX(0);
            }
            100% {
                opacity: 0;
                transform: translateX(200px);
            }
        }

        @keyframes slideUp {
            0% {
                transform: translateY(0);
            }
            100% {
                transform: translateY(-85px);
            }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .queue-item.exiting {
            animation: slideOut 0.5s ease forwards;
        }

        .queue-item.moving-up {
            animation: slideUp 0.5s ease forwards;
        }

        .queue-list.updating {
            animation: blink 0.3s ease 2;
        }

        /* Grace indicator */
        .grace-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 120px;
            color: #60a5fa;
            font-weight: bold;
            opacity: 0;
            pointer-events: none;
        }

        .grace-indicator.show {
            animation: graceAnimation 1s ease forwards;
        }

        @keyframes graceAnimation {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.5);
            }
            50% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.5);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) translateY(-150px) scale(1);
            }
        }

        /* Paused state */
        .paused-state {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .paused .paused-state {
            display: flex;
        }

        .pause-text {
            font-size: 150px;
            color: #fbbf24;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 20px;
            animation: pauseBlink 1s ease-in-out infinite;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes numberPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        @keyframes criticalNumberPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        @keyframes criticalPulse {
            0%, 100% {
                filter: drop-shadow(0 0 50px rgba(239, 68, 68, 0.8));
            }
            50% {
                filter: drop-shadow(0 0 80px rgba(239, 68, 68, 1));
            }
        }

        @keyframes pauseBlink {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.95); }
        }
    </style>
</head>
<body>
    <div class="overlay">
        <div class="main-display">
            <!-- Progress Ring -->
            <svg>
                <defs>
                    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
                        <stop offset="50%" style="stop-color:#4ade80;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
                    </linearGradient>
                    <linearGradient id="gradient-warning" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
                    </linearGradient>
                    <linearGradient id="gradient-critical" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
                    </linearGradient>
                </defs>
                <circle cx="400" cy="400" r="370" class="ring-background"></circle>
                <circle cx="400" cy="400" r="370" class="ring-progress" id="progress"></circle>
            </svg>

            <!-- Timer and Speaker (in front of ring) -->
            <div class="timer-group">
                <div class="speaker-name" id="current-speaker">Michael Chen</div>
                <div class="timer-display" id="timer">04:15</div>
            </div>
        </div>

        <!-- Next Speaker -->
        <div class="next-speaker">
            <div class="next-label">Next Speaker</div>
            <div class="next-name" id="next-speaker">Sarah Johnson</div>
        </div>

        <!-- Queue List -->
        <div class="queue-list" id="queue">
            <div class="queue-item current">
                <span class="queue-position">1</span>
                Michael Chen
            </div>
            <div class="queue-item next">
                <span class="queue-position">2</span>
                Sarah Johnson
            </div>
            <div class="queue-item">
                <span class="queue-position">3</span>
                David Kim
            </div>
            <div class="queue-item">
                <span class="queue-position">4</span>
                Emily Watson
            </div>
            <div class="queue-item">
                <span class="queue-position">5</span>
                James Miller
            </div>
        </div>

        <!-- Grace indicator -->
        <div class="grace-indicator" id="grace">+15s</div>

        <!-- Paused State -->
        <div class="paused-state">
            <div class="pause-text">PAUSED</div>
        </div>
    </div>

    <script>
        let seconds = 255; // 4:15
        let totalSeconds = 300; // 5 minutes total
        let paused = false;
        const circumference = 2 * Math.PI * 370;

        // Queue management
        const speakers = [
            'Michael Chen',
            'Sarah Johnson',
            'David Kim',
            'Emily Watson',
            'James Miller'
        ];
        let currentSpeakerIndex = 0;

        function updateTimer() {
            if (!paused) {
                seconds--;
                if (seconds < 0) {
                    nextSpeaker(); // Auto advance when time runs out
                    return;
                }
            }

            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            const display = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
            const timer = document.getElementById('timer');
            timer.textContent = display;

            // Update progress ring
            const progress = document.getElementById('progress');
            const offset = circumference - (seconds / totalSeconds) * circumference;
            progress.style.strokeDashoffset = offset;

            // Change colors based on time
            timer.className = 'timer-display';
            progress.className = 'ring-progress';
            if (seconds <= 30) {
                timer.className = 'timer-display critical';
                progress.className = 'ring-progress critical';
            } else if (seconds <= 120) {
                timer.className = 'timer-display warning';
                progress.className = 'ring-progress warning';
            }
        }

        function nextSpeaker() {
            // Animate current speaker out
            const queueItems = document.querySelectorAll('.queue-item');
            const currentItem = queueItems[0];

            currentItem.classList.add('exiting');

            setTimeout(() => {
                // Move everyone up
                currentSpeakerIndex = (currentSpeakerIndex + 1) % speakers.length;
                updateQueue();

                // Reset timer
                seconds = totalSeconds;

                // Update display
                document.getElementById('current-speaker').textContent = speakers[currentSpeakerIndex];
                document.getElementById('next-speaker').textContent = speakers[(currentSpeakerIndex + 1) % speakers.length];

                // Blink the queue twice
                const queueList = document.getElementById('queue');
                queueList.classList.add('updating');
                setTimeout(() => queueList.classList.remove('updating'), 600);
            }, 500);
        }

        function updateQueue() {
            const queueList = document.getElementById('queue');
            queueList.innerHTML = '';

            for (let i = 0; i < 5; i++) {
                const index = (currentSpeakerIndex + i) % speakers.length;
                const item = document.createElement('div');
                item.className = 'queue-item';

                if (i === 0) item.classList.add('current');
                if (i === 1) item.classList.add('next');

                item.innerHTML = `
                    <span class="queue-position">${i + 1}</span>
                    ${speakers[index]}
                `;

                queueList.appendChild(item);
            }
        }

        setInterval(updateTimer, 1000);

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'p' || e.key === 'P') {
                paused = !paused;
                document.querySelector('.overlay').classList.toggle('paused');
            } else if (e.key === 'g' || e.key === 'G') {
                seconds = Math.min(seconds + 15, totalSeconds);
                const grace = document.getElementById('grace');
                grace.classList.add('show');
                setTimeout(() => grace.classList.remove('show'), 1000);
            } else if (e.key === ' ' || e.key === 'e' || e.key === 'E') {
                // End turn
                nextSpeaker();
            } else if (e.key === 'n' || e.key === 'N' || e.key === 'Enter') {
                // Start next speaker (same as end turn in this mockup)
                nextSpeaker();
            }
        });
    </script>
</body>
</html>
