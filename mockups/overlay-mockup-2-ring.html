<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overlay Mockup 2 - Progress Ring Style</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #2a2a2a;
            background-image: url('https://picsum.photos/1920/1080');
            background-size: cover;
            background-position: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.6) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.5s ease;
        }

        .ring-container {
            position: relative;
            width: 600px;
            height: 600px;
        }

        svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .ring-background {
            fill: none;
            stroke: rgba(255,255,255,0.1);
            stroke-width: 40;
        }

        .ring-progress {
            fill: none;
            stroke: url(#gradient);
            stroke-width: 40;
            stroke-linecap: round;
            stroke-dasharray: 1758;
            stroke-dashoffset: 0;
            transition: stroke-dashoffset 1s linear, stroke 0.5s ease;
            filter: drop-shadow(0 0 20px rgba(74, 222, 128, 0.5));
        }

        .ring-progress.warning {
            stroke: url(#gradient-warning);
            filter: drop-shadow(0 0 20px rgba(251, 191, 36, 0.5));
        }

        .ring-progress.critical {
            stroke: url(#gradient-critical);
            filter: drop-shadow(0 0 30px rgba(239, 68, 68, 0.8));
            animation: pulseShadow 0.5s ease-in-out infinite;
        }

        .timer-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .timer-display {
            font-family: 'Bebas Neue', cursive;
            font-size: 140px;
            color: white;
            text-shadow: 0 4px 8px rgba(0,0,0,0.5);
            line-height: 1;
            letter-spacing: 8px;
        }

        .timer-label {
            font-size: 24px;
            color: rgba(255,255,255,0.7);
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .queue-pills {
            position: absolute;
            bottom: 120px;
            display: flex;
            gap: 15px;
            padding: 25px;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            border-radius: 50px;
        }

        .queue-pill {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transition: all 0.3s ease;
        }

        .queue-pill.active {
            width: 40px;
            height: 40px;
            background: #60a5fa;
            box-shadow: 0 0 20px rgba(96, 165, 250, 0.6);
        }

        .queue-pill.next {
            background: rgba(255,255,255,0.5);
            animation: pulse 2s ease-in-out infinite;
        }

        .speaker-name {
            position: absolute;
            top: 80px;
            font-size: 72px;
            color: white;
            font-weight: 700;
            text-shadow: 0 4px 8px rgba(0,0,0,0.5);
            text-align: center;
        }

        .action-buttons {
            position: absolute;
            bottom: 40px;
            display: flex;
            gap: 20px;
        }

        .action-btn {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.3);
            color: white;
            padding: 15px 30px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .action-btn:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.05);
        }

        .action-btn.primary {
            background: rgba(74, 222, 128, 0.3);
            border-color: #4ade80;
        }

        .action-btn.grace {
            background: rgba(96, 165, 250, 0.3);
            border-color: #60a5fa;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 0.8; }
        }

        @keyframes pulseShadow {
            0%, 100% { filter: drop-shadow(0 0 30px rgba(239, 68, 68, 0.8)); }
            50% { filter: drop-shadow(0 0 50px rgba(239, 68, 68, 1)); }
        }

        .paused-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
        }

        .paused .paused-overlay {
            display: flex;
        }

        .pause-icon {
            font-size: 200px;
            color: #fbbf24;
            animation: blink 1s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <div class="overlay">
        <div class="speaker-name">Sarah Johnson</div>

        <div class="ring-container">
            <svg>
                <defs>
                    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#4ade80;stop-opacity:1" />
                    </linearGradient>
                    <linearGradient id="gradient-warning" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1" />
                    </linearGradient>
                    <linearGradient id="gradient-critical" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#dc2626;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1" />
                    </linearGradient>
                </defs>
                <circle cx="300" cy="300" r="280" class="ring-background"></circle>
                <circle cx="300" cy="300" r="280" class="ring-progress" id="progress"></circle>
            </svg>
            <div class="timer-center">
                <div class="timer-display" id="timer">02:30</div>
                <div class="timer-label">Remaining</div>
            </div>
        </div>

        <div class="queue-pills">
            <div class="queue-pill active"></div>
            <div class="queue-pill next"></div>
            <div class="queue-pill"></div>
            <div class="queue-pill"></div>
            <div class="queue-pill"></div>
        </div>

        <div class="action-buttons">
            <button class="action-btn">⏸ Pause (P)</button>
            <button class="action-btn grace">+15s (G)</button>
            <button class="action-btn primary">Next (N)</button>
        </div>

        <div class="paused-overlay">
            <div class="pause-icon">⏸</div>
        </div>
    </div>

    <script>
        let seconds = 150; // 2:30
        let totalSeconds = 300; // 5 minutes total
        let paused = false;
        const circumference = 2 * Math.PI * 280;

        function updateTimer() {
            if (!paused) {
                seconds--;
                if (seconds < 0) seconds = 150;
            }

            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            const display = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
            document.getElementById('timer').textContent = display;

            // Update progress ring
            const progress = document.getElementById('progress');
            const offset = circumference - (seconds / totalSeconds) * circumference;
            progress.style.strokeDashoffset = offset;

            // Change color based on time
            progress.className = 'ring-progress';
            if (seconds <= 30) {
                progress.className = 'ring-progress critical';
            } else if (seconds <= 120) {
                progress.className = 'ring-progress warning';
            }
        }

        setInterval(updateTimer, 1000);

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'p' || e.key === 'P') {
                paused = !paused;
                document.querySelector('.overlay').classList.toggle('paused');
            } else if (e.key === 'g' || e.key === 'G') {
                seconds = Math.min(seconds + 15, totalSeconds);
            }
        });
    </script>
</body>
</html>
